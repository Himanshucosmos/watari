  <style>

    *{margin:0;padding:0;box-sizing:border-box}

    button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}

    /* ─── Intro Redesign ─── */
    #intro { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at center, rgba(8,6,16,0.3) 0%, rgba(4,3,8,0.9) 100%); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:opacity 0.3s ease; overflow:hidden; }
    #intro.out { opacity:0; pointer-events:none; }
    
    .intro-bg-kanji { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:55vh; color:#c8a66a; opacity:0.03; white-space:nowrap; pointer-events:none; font-weight:bold; animation: driftKanji 40s linear infinite; }
    @keyframes driftKanji { 0% { transform: translate(-55%, -50%); } 50% { transform: translate(-45%, -50%); } 100% { transform: translate(-55%, -50%); } }

    .intro-content { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeUp { 0% { opacity:0; transform:translateY(30px); } 100% { opacity:1; transform:translateY(0); } }

    .it { font-size:clamp(32px, 6vw, 54px); letter-spacing:0.8em; font-weight:300; margin-right:-0.8em; color:#fff; text-shadow:0 0 30px rgba(255,255,255,0.4), 0 0 80px rgba(200,166,106,0.2); }

    .is::before { right:100%; margin-right:15px; }
    .is::after { left:100%; margin-left:15px; }

    .iq { margin-top:40px; font-size:clamp(12px, 1.6vw, 15px); font-style:italic; color:rgba(232,230,224,0.6); letter-spacing:0.08em; text-align:center; max-width:480px; line-height:1.8; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    
    .ib { margin-top:50px; position:relative; padding:18px 54px; border:1px solid rgba(200,166,106,0.25); border-radius:100px; background:rgba(200,166,106,0.03); overflow:hidden; transition:all 0.4s cubic-bezier(0.16,1,0.3,1); backdrop-filter: blur(4px); }
    .ib-text { position:relative; z-index:2; font-size:13px; font-weight:400; letter-spacing:0.15em; color:#c8a66a; transition:all 0.4s ease; text-transform:uppercase; }

    .ib:hover { border-color:rgba(200,166,106,0.6); background:rgba(200,166,106,0.08); box-shadow:0 0 40px rgba(200,166,106,0.15), inset 0 0 20px rgba(200,166,106,0.1); transform:translateY(-2px); }
    .ib:hover .ib-text { letter-spacing:0.25em; color:#fff; text-shadow:0 0 10px rgba(200,166,106,0.8); }
    .ib:hover .ib-glow { transform:translateX(100%); }

    .ina { margin-top:30px; display:flex; align-items:center; gap:8px; font-size:10px; opacity:0.3; letter-spacing:0.1em; text-transform:uppercase; animation: pulseFade 3s ease-in-out infinite; }
    @keyframes pulseFade { 0%, 100% { opacity:0.15; } 50% { opacity:0.4; } }

    .intro-particles { position:absolute; inset:0; overflow:hidden; z-index:1; pointer-events:none; }
    .ip { position:absolute; width:2px; height:2px; border-radius:50%; background:#c8a66a; opacity:0; animation:ipf var(--dur) var(--del) ease-in-out infinite; box-shadow:0 0 10px #c8a66a; }
    @keyframes ipf { 0% { transform:translateY(0) scale(1); opacity:0; } 50% { opacity:0.5; transform:translateY(-30vh) scale(1.5); } 100% { transform:translateY(-60vh) scale(0.5); opacity:0; } }

    /* ─── HUD ─── */
    #hud{position:fixed;inset:0;z-index:10;pointer-events:none;padding:clamp(8px,2vw,18px);display:none;flex-direction:column;justify-content:space-between}
    #hud.on{display:flex}
    .g{background:rgba(10,12,16,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:12px}
    .ht{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
    .hb{display:flex;align-items:center;gap:8px;padding:8px 14px;pointer-events:auto}
    .hb .k{font-size:clamp(18px,3vw,26px);color:#c8a66a;text-shadow:0 0 16px rgba(200,166,106,.4)}
    .hb .t{font-size:clamp(11px,1.6vw,15px);letter-spacing:.3em;opacity:.8}
    .mb{display:flex;gap:4px;pointer-events:auto;padding:5px 6px;flex-wrap:wrap}
    .mo{padding:5px 12px;border-radius:16px;font-size:clamp(10px,1.4vw,12px);letter-spacing:.04em;color:rgba(232,230,224,.5);border:1px solid rgba(255,255,255,.06);transition:all .2s;white-space:nowrap}
    .mo:hover{color:#e8e6e0;border-color:rgba(255,255,255,.18)}
    .mo.on{background:rgba(200,166,106,.15);border-color:#c8a66a;color:#c8a66a}
    .stats{position:fixed;top:clamp(52px,7vh,70px);left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:11;pointer-events:none}
    .stat{padding:6px 14px;font-size:clamp(10px,1.3vw,12px);letter-spacing:.1em;color:rgba(232,230,224,.5);display:flex;align-items:center;gap:6px}
    .stat .sv{color:#c8a66a;font-size:clamp(12px,1.6vw,15px);font-weight:400}
    #collectFlash{position:fixed;inset:0;z-index:47;pointer-events:none;background:radial-gradient(circle at center,rgba(200,166,106,.25),transparent 70%);opacity:0;transition:opacity .15s ease-out}

    /* ─── Music Player ─── */
    #music-bar{position:fixed;bottom:clamp(8px,2vw,16px);left:clamp(8px,2vw,16px);z-index:15;pointer-events:auto;display:none;width:min(310px,calc(100vw - 24px));padding:12px 14px;flex-direction:column;gap:7px;transition:transform .35s ease,opacity .35s ease}
    #music-bar.on{display:flex}
    /* Mini toggle for mobile — shown when player is collapsed */
    #music-mini{position:fixed;bottom:clamp(8px,2vw,16px);left:clamp(8px,2vw,16px);z-index:16;display:none;align-items:center;gap:8px;padding:7px 12px;pointer-events:auto;cursor:pointer}
    #music-mini.on{display:flex}
    #music-mini .mm-title{font-size:10px;letter-spacing:.1em;opacity:.7;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#c8a66a}
    #music-mini .mm-play{font-size:16px;opacity:.8}
    #music-expand{font-size:10px;opacity:.35;margin-left:auto;letter-spacing:.08em}
    .m-title{font-size:11px;letter-spacing:.12em;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;color:#c8a66a}
    .m-sub{font-size:9px;opacity:.35;letter-spacing:.08em;text-align:center}
    .m-controls{display:flex;align-items:center;justify-content:center;gap:10px}
    .m-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;color:rgba(232,230,224,.6);transition:all .2s;cursor:pointer;touch-action:manipulation}
    .m-btn:hover{color:#c8a66a;background:rgba(200,166,106,.1)}
    .m-btn.play{width:40px;height:40px;font-size:19px;background:rgba(200,166,106,.15);color:#c8a66a;border:1px solid rgba(200,166,106,.25)}
    .m-btn.play:hover{background:rgba(200,166,106,.25)}
    .m-btn.active{color:#c8a66a}
    .m-seek{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.08);cursor:pointer;position:relative;overflow:hidden}
    .m-seek-fill{height:100%;background:linear-gradient(90deg,rgba(200,166,106,.4),#c8a66a);border-radius:2px;width:0%;transition:width .3s linear}
    .m-time{display:flex;justify-content:space-between;font-size:9px;opacity:.3;letter-spacing:.05em}

    .bf{text-align:center;font-size:clamp(9px,1.2vw,10px);color:rgba(232,230,224,.25);letter-spacing:.05em;line-height:1.7}
    kbd{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:0 4px;font-family:inherit;font-size:9px}
    /* D-pad + speed */
    .dp{position:fixed;bottom:clamp(60px,12vh,90px);right:clamp(12px,3vw,20px);display:flex;flex-direction:column;align-items:center;gap:3px;z-index:15;pointer-events:auto}
    .dr{display:flex;gap:3px}
    .db{width:50px;height:50px;border-radius:12px;font-size:20px;display:flex;align-items:center;justify-content:center;color:rgba(232,230,224,.5);touch-action:manipulation}
    .db:active{background:rgba(200,166,106,.2);color:#c8a66a}
    .sp2{position:fixed;bottom:clamp(60px,12vh,90px);left:clamp(12px,3vw,20px);display:flex;flex-direction:column;gap:4px;align-items:center;z-index:15;pointer-events:auto}
    .sp-label{font-size:8px;letter-spacing:.15em;opacity:.35;text-transform:uppercase}
    .sb{width:50px;height:50px;border-radius:12px;font-size:26px;display:flex;align-items:center;justify-content:center;color:rgba(232,230,224,.5);touch-action:manipulation}
    .sb:active{background:rgba(200,166,106,.2);color:#c8a66a}
    /* Action buttons (scatter, V-form) */
    .act-bar{position:fixed;bottom:clamp(12px,2.5vw,18px);left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:15;pointer-events:auto}
    .act-btn{padding:10px 18px;border-radius:20px;font-size:clamp(11px,1.5vw,13px);letter-spacing:.06em;color:rgba(232,230,224,.55);border:1px solid rgba(255,255,255,.08);transition:all .2s;white-space:nowrap;touch-action:manipulation}
    .act-btn:hover{color:#e8e6e0;border-color:rgba(255,255,255,.18)}
    .act-btn:active,.act-btn.on{background:rgba(200,166,106,.18);border-color:#c8a66a;color:#c8a66a}
    /* Mobile responsive tweaks */
    @media(max-width:500px){
      .bf{display:none}
      .mb{gap:3px}.mo{padding:4px 9px;font-size:10px}
      #music-bar{display:none!important} /* on mobile, always use mini player */
      #music-mini.on{display:flex!important; bottom:20px; left:50%; transform:translateX(-50%); width:max-content; background:rgba(10,12,16,.85); border-radius:30px; border:1px solid rgba(255,255,255,.08); padding:10px 16px;}
      .act-bar{bottom:clamp(110px,18vh,130px); transform:translateX(-50%) scale(0.85); width:max-content}
      .dp{transform-origin:bottom right; transform:scale(0.8); bottom:clamp(40px,7vh,50px)}
      .sp2{transform-origin:bottom left; transform:scale(0.8); bottom:clamp(40px,7vh,50px)}
      .intro-bg-kanji{font-size:120vw}
      .it{font-size:26px; letter-spacing:0.4em; margin-right:-0.4em}
      .is{letter-spacing:0.15em; font-size:9px}
      .is::before, .is::after{width:15px}
      .iq{font-size:11px; margin-top:24px; max-width:85vw}
      .ib{margin-top:30px; padding:12px 32px}
      .stats{transform:translateX(-50%) scale(0.85); top:clamp(40px,5vh,60px)}
    }

    /* ─── Achievement Toast ─── */
    #achToast{position:fixed;top:clamp(80px,11vh,100px);right:clamp(12px,3vw,20px);z-index:25;display:flex;align-items:center;gap:12px;padding:12px 16px;pointer-events:none;opacity:0;transform:translateX(120%);transition:opacity .4s ease,transform .4s cubic-bezier(.34,1.56,.64,1);max-width:clamp(180px,28vw,260px)}
    #achToast.show{opacity:1;transform:translateX(0)}
    /* ─── Orb type hint (bottom of screen) ─── */
    #orbHint{position:fixed;bottom:clamp(130px,20vh,160px);left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;opacity:0;transition:opacity .5s;font-size:9px;letter-spacing:.2em;color:rgba(200,166,106,.6);text-transform:uppercase}
    #gr{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
    #vi{position:fixed;inset:0;z-index:48;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.45))}

    /* ─── Haiku Overlay ─── */
    #haikuOverlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-55%);z-index:22;pointer-events:none;opacity:0;transition:opacity 1.2s ease;text-align:center;font-size:clamp(13px,2vw,18px);font-style:italic;letter-spacing:.12em;line-height:2.2;color:rgba(232,230,224,.8);text-shadow:0 0 40px rgba(200,166,106,.7),0 2px 20px rgba(0,0,0,.6);white-space:pre-line;max-width:clamp(240px,40vw,400px)}
    #haikuOverlay.show{opacity:1}
    /* ─── Milestone Popup ─── */
    #milestonePop{position:fixed;top:clamp(90px,13vh,115px);left:50%;transform:translateX(-50%);z-index:22;pointer-events:none;opacity:0;transition:opacity .8s ease;text-align:center;font-size:clamp(9px,1.2vw,11px);letter-spacing:.25em;color:rgba(200,166,106,.9);text-shadow:0 0 25px rgba(200,166,106,.5);text-transform:uppercase}
    #milestonePop.show{opacity:1}
    /* ─── Combo Display ─── */
    #comboDisplay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:22;pointer-events:none;opacity:0;transition:opacity .25s;text-align:center;font-size:clamp(18px,4vw,34px);letter-spacing:.08em;color:#c8a66a;text-shadow:0 0 30px rgba(200,166,106,.8),0 0 60px rgba(200,166,106,.4);font-weight:300}
    #comboDisplay.show{opacity:1}
    /* ─── Zen Mode Indicator ─── */
    #zenBadge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:21;pointer-events:none;opacity:0;transition:opacity 1s ease;text-align:center;font-size:clamp(10px,1.3vw,12px);letter-spacing:.3em;color:rgba(200,224,255,.5);text-transform:uppercase;margin-top:60px}
    #zenBadge.show{opacity:1}
    /* ─── Volume Slider ─── */
    .m-vol{display:flex;align-items:center;gap:8px;padding:0 2px}
    .m-vol-label{font-size:9px;opacity:.35;letter-spacing:.1em}
    .m-vol input[type=range]{flex:1;height:3px;border-radius:2px;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.1);cursor:pointer;accent-color:#c8a66a}
    .m-vol input[type=range]::-webkit-slider-thumb{appearance:none;width:12px;height:12px;border-radius:50%;background:#c8a66a;cursor:pointer}
    /* ─── Zen button active ─── */
    .act-btn.zen-on{background:rgba(100,180,255,.12);border-color:rgba(140,200,255,.5);color:rgba(180,220,255,.9)}
  </style>
</head>

function syncPlayBtn(){const p=audio.paused;mPlay.textContent=p?'▶':'⏸';mPlayMini.textContent=p?'▶':'⏸';}
function loadTrack(i){
  ci=((i%playlist.length)+playlist.length)%playlist.length;
  audio.src=playlist[ci].u;
  const title='♪ '+playlist[ci].t;
  mTitle.textContent=title;mTitleMini.textContent=title;
  mFill.style.width='0%';mCur.textContent='0:00';mDur.textContent='0:00';
  audio.play().catch(()=>{});
  syncPlayBtn();
}

});

  if(audio.duration){mFill.style.width=(audio.currentTime/audio.duration*100)+'%';mCur.textContent=fmt(audio.currentTime);}
});

document.getElementById('mSeek').addEventListener('click',(e)=>{

function makeIsland(x,z,w,h){
  const sh=new THREE.Shape();sh.moveTo(-w/2,-5);
  for(let i=0;i<=16;i++){const t=i/16,ix=-w/2+t*w;
    sh.lineTo(ix,Math.max(0,Math.sin(t*Math.PI)*h*(.7+.3*Math.sin(t*5))+Math.sin(t*Math.PI*3)*h*.15))}

let rainCtx=null, rainGain=null;
function initRainAudio(){
  if(rainCtx)return;
  try{
    rainCtx=new(window.AudioContext||window.webkitAudioContext)();
    const bs=2*rainCtx.sampleRate;const nb=rainCtx.createBuffer(1,bs,rainCtx.sampleRate);
    const od=nb.getChannelData(0);for(let i=0;i<bs;i++)od[i]=Math.random()*2-1;
    const ns=rainCtx.createBufferSource();ns.buffer=nb;ns.loop=true;
    const f=rainCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=600;
    rainGain=rainCtx.createGain();rainGain.gain.value=0;
    ns.connect(f);f.connect(rainGain);rainGain.connect(rainCtx.destination);ns.start();

// BIRDS — elegant crane/swallow shape
// ════════════════════════════════════════════
function makeBird(col,sc,isLeader){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({
    color:col,metalness:0.1,roughness:0.55,
    side:THREE.DoubleSide,emissive:col,emissiveIntensity:isLeader?0.15:0
  });
  const S=sc;

  // Body — elongated diamond/fusiform
  const bodyV=[
    0,0,-1*S,     // nose tip
    0,.1*S,-.2*S, // upper mid
    0,-.06*S,-.15*S, // lower mid
    .06*S,0,-.3*S,// right mid
    -.06*S,0,-.3*S,// left mid
    0,.03*S,.55*S, // tail root
  ];
  const bodyI=[0,1,3, 0,3,2, 0,2,4, 0,4,1, 1,5,3, 3,5,2, 2,5,4, 4,5,1];
  const bGeo=new THREE.BufferGeometry();
  bGeo.setAttribute('position',new THREE.Float32BufferAttribute(bodyV,3));
  bGeo.setIndex(bodyI);bGeo.computeVertexNormals();
  g.add(new THREE.Mesh(bGeo,mat));

  // Left wing — inner segment + outer feather tip
  const lwGroup=new THREE.Group();
  // Inner wing
  const liV=[0,.04*S,-.1*S, -.8*S,.12*S,-.2*S, -.25*S,.02*S,.35*S, 0,0,.2*S];
  const liGeo=new THREE.BufferGeometry();
  liGeo.setAttribute('position',new THREE.Float32BufferAttribute(liV,3));
  liGeo.setIndex([0,1,2, 0,2,3, 3,2,1,0]);liGeo.computeVertexNormals();
  lwGroup.add(new THREE.Mesh(liGeo,mat));
  // Outer feather tip
  const loV=[-.8*S,.12*S,-.2*S, -1.4*S,.14*S,-.1*S, -.6*S,.06*S,.15*S];
  const loGeo=new THREE.BufferGeometry();
  loGeo.setAttribute('position',new THREE.Float32BufferAttribute(loV,3));
  loGeo.setIndex([0,1,2, 2,1,0]);loGeo.computeVertexNormals();
  lwGroup.add(new THREE.Mesh(loGeo,mat));
  g.add(lwGroup);

  // Right wing — mirror
  const rwGroup=new THREE.Group();
  const riV=[0,.04*S,-.1*S, .8*S,.12*S,-.2*S, .25*S,.02*S,.35*S, 0,0,.2*S];
  const riGeo=new THREE.BufferGeometry();
  riGeo.setAttribute('position',new THREE.Float32BufferAttribute(riV,3));
  riGeo.setIndex([0,1,2, 0,2,3, 3,2,1,0]);riGeo.computeVertexNormals();
  rwGroup.add(new THREE.Mesh(riGeo,mat));
  const roV=[.8*S,.12*S,-.2*S, 1.4*S,.14*S,-.1*S, .6*S,.06*S,.15*S];
  const roGeo=new THREE.BufferGeometry();
  roGeo.setAttribute('position',new THREE.Float32BufferAttribute(roV,3));
  roGeo.setIndex([0,1,2, 2,1,0]);roGeo.computeVertexNormals();
  rwGroup.add(new THREE.Mesh(roGeo,mat));
  g.add(rwGroup);

  // Forked tail feathers
  const t1V=[0,.03*S,.5*S, -.15*S,.05*S,.9*S, 0,.01*S,.55*S];
  const t1Geo=new THREE.BufferGeometry();
  t1Geo.setAttribute('position',new THREE.Float32BufferAttribute(t1V,3));
  t1Geo.setIndex([0,1,2, 2,1,0]);t1Geo.computeVertexNormals();
  g.add(new THREE.Mesh(t1Geo,mat));
  const t2V=[0,.03*S,.5*S, .15*S,.05*S,.9*S, 0,.01*S,.55*S];
  const t2Geo=new THREE.BufferGeometry();
  t2Geo.setAttribute('position',new THREE.Float32BufferAttribute(t2V,3));
  t2Geo.setIndex([0,1,2, 2,1,0]);t2Geo.computeVertexNormals();
  g.add(new THREE.Mesh(t2Geo,mat));

  g.userData={lw:lwGroup,rw:rwGroup,ph:Math.random()*6.28,fs:2.5+Math.random()*2,mat};
  return g;
}

// ── Bell synth (Web Audio) ──
let bellCtx=null;
function playBell(freq=660,vol=0.07){
  try{
    if(!bellCtx)bellCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=bellCtx.createOscillator(),g=bellCtx.createGain();
    const o2=bellCtx.createOscillator(),g2=bellCtx.createGain();
    o.connect(g);o2.connect(g2);g.connect(bellCtx.destination);g2.connect(bellCtx.destination);
    o.type='sine';o2.type='sine';
    o.frequency.setValueAtTime(freq,bellCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*.5,bellCtx.currentTime+1.8);
    o2.frequency.setValueAtTime(freq*2.76,bellCtx.currentTime); // bell harmonic
    g.gain.setValueAtTime(vol,bellCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,bellCtx.currentTime+2);
    g2.gain.setValueAtTime(vol*.5,bellCtx.currentTime);g2.gain.exponentialRampToValueAtTime(0.0001,bellCtx.currentTime+1.5);
    o.start();o2.start();o.stop(bellCtx.currentTime+2);o2.stop(bellCtx.currentTime+2);
  }catch(e){}
}

  {color:'white',  hex:0xeeeeff,glow:'rgba(220,230,255,', freq:770,  effect:'vform'},
];
const ORB_TYPE_WEIGHTS=[0.55,0.18,0.18,0.09]; // mostly gold
function pickOrbType(){
  const r=Math.random();let acc=0;
  for(let i=0;i<ORB_TYPES.length;i++){acc+=ORB_TYPE_WEIGHTS[i];if(r<acc)return i;}
  return 0;
}
function makeOrbTex(type){
  const ot=ORB_TYPES[type],c=document.createElement('canvas');c.width=96;c.height=96;
  const x=c.getContext('2d');
  const g=x.createRadialGradient(48,48,0,48,48,48);
  const gw=ot.glow;
  g.addColorStop(0,gw+'1)');g.addColorStop(.1,gw+'0.95)');g.addColorStop(.3,gw+'0.6)');
  g.addColorStop(.55,gw+'0.2)');g.addColorStop(1,gw+'0)');
  x.fillStyle=g;x.fillRect(0,0,96,96);
  x.globalCompositeOperation='screen';x.globalAlpha=0.45;x.fillStyle='#ffffff';
  x.fillRect(44,20,8,56);x.fillRect(20,44,56,8);
  return new THREE.CanvasTexture(c);
}
const orbTexCache=ORB_TYPES.map((_,i)=>makeOrbTex(i));
const ORB_COUNT=14,ORB_RANGE=250,ORB_COLLECT_R=18,ORB_MAGNET_R=55,ORB_MAGNET_STR=0.025;
const orbs=[];
for(let i=0;i<ORB_COUNT;i++){
  const tp=pickOrbType();
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:orbTexCache[tp],transparent:true,opacity:.8,blending:THREE.AdditiveBlending,depthWrite:false}));
  s.userData.type=tp;
  s.scale.set(6,6,1);
  s.position.set((Math.random()-.5)*240,12+Math.random()*50,lead.position.z-(60+Math.random()*ORB_RANGE));
  scene.add(s);orbs.push(s);
}
let orbsCollected=0,distTraveled=0,lastLeadZ=0;
const orbCountEl=document.getElementById('orbCount');
const distCountEl=document.getElementById('distCount');

let zenMode=false,zenAngle=0; // Zen autopilot

// RENDER LOOP

const clock=new THREE.Clock(false);let started=false;

function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),.05);
  const t=clock.getElapsedTime();

  // Ocean waves
  const sw=curM==='storm'?3.5:1;
  for(let i=0;i<oPosAttr.count;i++){
    const x=oPosAttr.getX(i),y=oPosAttr.getY(i); // Local Y maps to World -Z
    oPosAttr.setZ(i,(Math.sin(x*.018+t*.7)*.6+Math.sin(y*.013+t*.55)*.4+Math.sin((x+y)*.009+t*1.1)*.25+Math.sin(x*.04+t*1.5)*.1)*sw);
  }
  oPosAttr.needsUpdate=true;oceanGeo.computeVertexNormals();

  // Stars — twinkle by slightly modulating size
  const targetStarOp=MD[curM].stO;
  stMat.opacity+=(targetStarOp-stMat.opacity)*dt*2;
  stMat.size=1.6+Math.sin(t*1.3)*0.3;
  stars.rotation.y+=.00004;
  
  // Keep celestial objects centered on camera so they are infinitely far away
  sky.position.copy(camera.position);
  stars.position.copy(camera.position);
  if(aurora1 && aurora2) {
    aurora1.position.z = camera.position.z - 1500;
    aurora2.position.z = camera.position.z - 1550;
    aurora1.position.x = aurora2.position.x = camera.position.x;
  }
  // Shooting star — random chance in night mode
  if(curM==='night'&&!shootStar.active&&Math.random()<dt*0.08){
    shootStar.active=true;shootStar.life=0.8+Math.random()*0.6;
    shootStar.pos.set(camera.position.x+(Math.random()-.5)*800,camera.position.y+100+Math.random()*200,camera.position.z-300-Math.random()*200);
    shootStar.vel.set((Math.random()-.5)*600,-100-Math.random()*200,(Math.random()-.5)*100);
    ssSprite.material.opacity=0.9;ssSprite.visible=true;
  }
  if(shootStar.active){
    shootStar.life-=dt;
    shootStar.pos.addScaledVector(shootStar.vel,dt);
    ssSprite.position.copy(shootStar.pos);
    ssSprite.material.opacity=Math.max(0,shootStar.life/1.2*0.9);
    if(shootStar.life<=0){shootStar.active=false;ssSprite.visible=false;}
  }

  // Moon — camera-relative, always in upper-right sky
  const moonTarget=curM==='night'?0.9:0;
  moon.material.opacity+=(moonTarget-moon.material.opacity)*dt*2;
  const mlTarget=curM==='night'?0.6:0; 
  moonLight.intensity+=(mlTarget-moonLight.intensity)*dt*2;
  moon.position.set(
    camera.position.x+240+Math.sin(t*0.005)*8,
    camera.position.y+200+Math.sin(t*0.007)*4,
    camera.position.z-340
  );

  // Layered Aurora Animation
  const auTarget=curM==='night'?0.45:0;
  auMat1.opacity+=(auTarget-auMat1.opacity)*dt*0.8;
  auMat2.opacity+=((auTarget*0.7)-auMat2.opacity)*dt*0.8;
  if(auMat1.opacity>0.01){
    const ap1=aurora1.geometry.attributes.position.array;
    const ap2=aurora2.geometry.attributes.position.array;
    for(let i=0;i<ap1.length;i+=3){
      ap1[i+1]=Math.sin(ap1[i]*0.0015+t*0.4)*160+Math.sin(ap1[i]*0.004+t*0.9)*70;
      ap2[i+1]=Math.sin(ap2[i]*0.0012-t*0.3)*180+Math.sin(ap2[i]*0.003-t*0.5)*90;
    }
    aurora1.geometry.attributes.position.needsUpdate=true;
    aurora2.geometry.attributes.position.needsUpdate=true;
  }

  // Rain dynamics
  const rTarget=curM==='storm'?0.7:0;
  rainMat.opacity+=(rTarget-rainMat.opacity)*dt*2;
  if(rainMat.opacity>0.01){
    const rp=rain.geometry.attributes.position.array;
    for(let i=0;i<RAIN_COUNT;i++){
      rp[i*3+1]-=rainVel[i]*dt; // fall y
      rp[i*3]-=50*dt; // wind blown x
      if(rp[i*3+1]<0){
        rp[i*3+1]=600+Math.random()*100;
        rp[i*3]=camera.position.x+(Math.random()-.5)*800+200; // spawn ahead of wind
        rp[i*3+2]=camera.position.z-300+(Math.random()-.5)*600;
      }
    }
    rain.geometry.attributes.position.needsUpdate=true;
  }
  // Sun glow sprite — tracks sun position for dusk
  const sgTarget=MD[curM].sg;
  sunGlow.material.opacity+=(sgTarget-sunGlow.material.opacity)*dt*1.5;
  if(sgTarget>0.01){
    // Position sun glow at horizon
    const sgDir=new THREE.Vector3().copy(sunV).normalize();
    sunGlow.position.set(
      camera.position.x+sgDir.x*500,
      camera.position.y+Math.max(-30,sgDir.y*300)+10,
      camera.position.z+sgDir.z*-200
    );
  }

  // Fireflies — only at night, bounded so they don't drift away
  const ffTarget=curM==='night'?0.75:0;
  ffMat.opacity+=(ffTarget-ffMat.opacity)*dt*2;
  if(ffMat.opacity>0.01){
    const fp=fireflies.geometry.attributes.position;
    for(let i=0;i<FF_COUNT;i++){
      fp.array[i*3]+=Math.sin(t*0.3+ffPhase[i])*0.1;
      fp.array[i*3+1]+=Math.cos(t*0.4+ffPhase[i]*2)*0.05;
      fp.array[i*3+2]+=Math.cos(t*0.25+ffPhase[i])*0.08;
      // Soft bounds — wrap around leader
      const ffDx=fp.array[i*3]-lead.position.x;
      const ffDz=fp.array[i*3+2]-lead.position.z;
      if(Math.abs(ffDx)>300)fp.array[i*3]=lead.position.x+(Math.random()-.5)*200;
      if(fp.array[i*3+1]<1||fp.array[i*3+1]>75)fp.array[i*3+1]=5+Math.random()*55;
      if(Math.abs(ffDz)>300)fp.array[i*3+2]=lead.position.z+(Math.random()-.5)*200;
    }
    fp.needsUpdate=true;
  }
  // Storm lightning
  if(curM==='storm'){
    lightningTimer-=dt;
    if(lightningTimer<=0){
      lightningTimer=2+Math.random()*5;
      lightningFlash=0.4+Math.random()*0.5;
    }
    lightningFlash*=Math.pow(0.001,dt); // fast decay
    stormLight.intensity=lightningFlash;
  }else{
    stormLight.intensity*=Math.pow(0.01,dt);
  }

  // Leader aura pulse
  const auraPulse=0.35+Math.sin(t*2)*0.12;
  leaderAura.material.opacity=auraPulse;
  leaderAura.scale.setScalar(9+Math.sin(t*1.5)*1.5);
  // Trailing sparkle particles
  if(started){
    const trailSpawnRate=0.12; // spawn one every ~0.12s
    for(let i=0;i<TRAIL_COUNT;i++){
      const tp=trailParticles[i];
      if(tp.life<=0){
        if(Math.random()<dt/trailSpawnRate){
          tp.life=tp.maxLife;
          tp.sprite.visible=true;
          tp.sprite.position.copy(lead.position);
          tp.sprite.position.x+=(Math.random()-.5)*3;
          tp.sprite.position.y+=(Math.random()-.5)*2;
          tp.sprite.position.z+=2+Math.random()*3;
          tp.sprite.scale.setScalar(1.2+Math.random()*1.5);
        }
      }else{
        tp.life-=dt;
        const frac=tp.life/tp.maxLife;
        tp.sprite.material.opacity=frac*0.45;
        tp.sprite.scale.setScalar(tp.sprite.scale.x*0.97);
        tp.sprite.position.y+=dt*1.5;
        tp.sprite.position.z+=dt*8;
        if(tp.life<=0){tp.sprite.visible=false;}
      }
    }
  }
  // Leader glow intensity changes by mood
  leaderGlow.intensity=curM==='night'?2.5:curM==='dusk'?1.2:0.6;

  // Petals
  const tpo=curM==='day'?.7:curM==='dusk'?.5:curM==='storm'?0:.2;
  pMat.opacity+=(tpo-pMat.opacity)*dt*1.5;
  if(pMat.opacity>.01){
    const pp=petals.geometry.attributes.position;
    for(let i=0;i<PC;i++){
      pp.array[i*3]+=pVel[i*3]*dt*4+Math.sin(t+i)*.02;
      pp.array[i*3+1]+=pVel[i*3+1]*dt*3;
      pp.array[i*3+2]+=pVel[i*3+2]*dt*4+Math.cos(t*.7+i)*.02;
      if(pp.array[i*3+1]<-2){pp.array[i*3+1]=90+Math.random()*20;pp.array[i*3]=(Math.random()-.5)*500;pp.array[i*3+2]=(Math.random()-.5)*500}
    }
    pp.needsUpdate=true;
  }

  // Clouds — drift and billboard toward camera
  const tco=curM==='night'?.35:curM==='storm'?.65:.55; // restored cloud opacity
  cloudGroup.children.forEach(c=>{
    c.material.opacity+=(tco-c.material.opacity)*dt;
    c.position.x+=.35*dt*(curM==='storm'?3:1);
    if(c.position.x>1500)c.position.x=-1500;
    c.lookAt(camera.position); // billboard
  });

  // (Dynamic emissive updates moved to applyM)

  if(!started){renderer.render(scene,camera);return}

  // ── Leader ──
  // Zen autopilot — gently steers with sinusoidal curves
  if(zenMode){
    zenAngle+=dt*0.22;
    st.x=Math.sin(zenAngle)*0.55;
    st.y=Math.sin(zenAngle*0.6)*0.2;
  }
  const tr=1.4*spd;
  lv.x+=st.x*tr*dt*60;lv.y+=st.y*tr*.7*dt*60;
  lv.x*=.94;lv.y*=.94;lv.z=-20*spd;
  if(lead.position.y+lv.y*dt<4)lv.y=Math.max(lv.y,.4);
  if(lead.position.y+lv.y*dt>85)lv.y=Math.min(lv.y,-.3);
  lead.position.addScaledVector(lv,dt);
  lead.lookAt(lead.position.x+lv.x,lead.position.y+lv.y,lead.position.z+lv.z);
  lead.rotateZ(-st.x*.3);
  lead.userData.ph+=dt*lead.userData.fs;
  const lfl=Math.sin(lead.userData.ph)*.5;
  lead.userData.lw.rotation.z=lfl;lead.userData.rw.rotation.z=-lfl;

  // Update bird follow light position
  birdLight.position.copy(lead.position);
  birdLight.position.y+=3;

  // ── Orb collection + distance ──
  distTraveled+=Math.abs(lead.position.z-lastLeadZ);lastLeadZ=lead.position.z;
  distCountEl.textContent=Math.floor(distTraveled);
  for(let i=0;i<ORB_COUNT;i++){
    const o=orbs[i];
    // Pulse glow
    o.material.opacity=.55+Math.sin(t*2+i*1.3)*.3;
    o.scale.setScalar(5.5+Math.sin(t*1.5+i)*1.2);
    // Gentle magnetism — orbs drift toward leader when nearby (not instant, just a nudge)
    const odx=lead.position.x-o.position.x,ody=lead.position.y-o.position.y,odz=lead.position.z-o.position.z;
    const od=Math.sqrt(odx*odx+ody*ody+odz*odz);
    if(od<ORB_MAGNET_R&&od>ORB_COLLECT_R){
      const pull=ORB_MAGNET_STR*(1-od/ORB_MAGNET_R); // stronger when closer
      o.position.x+=odx*pull;
      o.position.y+=ody*pull;
      o.position.z+=odz*pull;
      // Brighten when being attracted
      o.material.opacity=Math.min(1,.7+Math.sin(t*4+i)*0.2);
      o.scale.setScalar(6.5+Math.sin(t*2+i)*1.5);
    }
    // Check collection
    if(od<ORB_COLLECT_R){
      orbsCollected++;orbCountEl.textContent=orbsCollected;
      collectFlash.style.opacity='1';setTimeout(()=>collectFlash.style.opacity='0',150);

      // Orb type effects
      const ot=ORB_TYPES[o.userData.type];
      triggerCombo(t);
      // Haiku every 3rd orb
      if(orbsCollected%3===0)showHaiku();
      // Achievement check
      if(achOrbIdx<achOrbs.length&&orbsCollected>=achOrbs[achOrbIdx].n){
        const a=achOrbs[achOrbIdx++];
        showAch(a.i,a.t,a.d);
      }
      // Type-specific effect
      if(ot.effect==='speed'){
        spd=Math.min(3,spd+0.35);
        setTimeout(()=>{spd=Math.max(1,spd-0.35);},5000);
      }else if(ot.effect==='scatter'){
        fl.forEach(b=>{b.userData.vel.x+=(Math.random()-.5)*14;b.userData.vel.y+=(Math.random()-.5)*6;});
      }else if(ot.effect==='vform'){
        form=true;document.getElementById('btnVform').classList.add('on');
        setTimeout(()=>{form=false;document.getElementById('btnVform').classList.remove('on');},8000);
      }
      // Flock grows every 3 orbs (max 120 birds)
      if(orbsCollected%3===0&&fl.length<120){
        const p=plumage[fl.length%plumage.length];
        const nc=new THREE.Color().setHSL(p[0]+Math.random()*.04,p[1]+Math.random()*.1,p[2]+Math.random()*.12);
        const nb=makeBird(nc,.65+Math.random()*.5,false);
        nb.position.set(lead.position.x+(Math.random()-.5)*60,lead.position.y+Math.random()*20,lead.position.z+(Math.random()-.5)*60);
        nb.userData.vel=new THREE.Vector3((Math.random()-.5)*2,0,-14-Math.random()*6);
        scene.add(nb);fl.push(nb);
        showAch('🐦',`Flock grows!`,`now ${fl.length} birds`);
      }
      // Respawn orb with random type
      const newType=pickOrbType();
      o.userData.type=newType;
      o.material.map=orbTexCache[newType];
      o.material.needsUpdate=true;
      o.position.set(lead.position.x+(Math.random()-.5)*160,12+Math.random()*50,lead.position.z-(120+Math.random()*ORB_RANGE));
    }
    // Keep orbs that are passed behind respawning ahead
    if(o.position.z>lead.position.z+60){
      const newType=pickOrbType();
      o.userData.type=newType;
      o.material.map=orbTexCache[newType];
      o.material.needsUpdate=true;
      o.position.set(lead.position.x+(Math.random()-.5)*180,12+Math.random()*50,lead.position.z-(80+Math.random()*ORB_RANGE));
    }
  }

  // Infinite World Wrap: Teleport back perfectly to keep player centered in ocean boundaries
  if(lead.position.z < -4000){
    const J = 4000;
    lead.position.z += J;
    lastLeadZ += J;
    camera.position.z += J;
    fl.forEach(b => b.position.z += J);
    orbs.forEach(o => o.position.z += J);
    if(shootStar && shootStar.active) shootStar.pos.z += J;
    cloudGroup.children.forEach(c => {
      c.position.z += J;
      if(c.position.z > camera.position.z + 1000) c.position.z -= 3000;
    });
    if (ffMat.opacity > 0.01) {
      const fp = fireflies.geometry.attributes.position.array;
      for(let i=0;i<FF_COUNT;i++) fp[i*3+2] += J;
      fireflies.geometry.attributes.position.needsUpdate = true;
    }
  }

  // Distance milestones
  checkMilestone(distTraveled);
  // Auto theme cycle (kicks in after 5min play, shifts every 3min)
  autoPlayTime+=dt;
  if(autoPlayTime>AUTO_CYCLE_START){
    autoCycleTimer+=dt;
    if(autoCycleTimer>=THEME_DURATION){
      autoCycleTimer=0;
      const modes=Object.keys(MD);
      const ci2=modes.indexOf(curM);
      const next=modes[(ci2+1)%modes.length];
      applyM(next);
      document.querySelectorAll('.mo').forEach(b=>b.classList.toggle('on',b.dataset.m===next));
    }
  }

  // ── Flock — STRONGER cohesion, always returns ──
  const lp=lead.position;
  for(let i=0;i<FN;i++){
    const b=fl[i],v=b.userData.vel,p=b.position;

    // Distance to leader
    const dx=lp.x-p.x, dy=lp.y-p.y, dz=(lp.z+20)-p.z; // target slightly behind leader
    const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);

    if(form){
      const row=Math.floor((i+1)/2),side=(i%2===0)?1:-1;
      v.x+=(lp.x+side*row*5.5-p.x)*.1;v.y+=(lp.y-row*1.2-p.y)*.1;v.z+=(lp.z+row*7-p.z)*.1;
    }else{
      // Cohesion scales UP the further away bird is — they ALWAYS return
      const cohesionStrength=dist>80?.15:dist>40?.04:.012;
      v.x+=dx*cohesionStrength;
      v.y+=dy*cohesionStrength;
      v.z+=dz*cohesionStrength;

      // Gentle wander
      v.x+=Math.sin(t*.25+i*1.7)*.04;
      v.y+=Math.cos(t*.2+i*2.3)*.02;
    }

    // Separation
    for(let j=0;j<FN;j++){
      if(i===j)continue;
      const sx=p.x-fl[j].position.x,sy=p.y-fl[j].position.y,sz=p.z-fl[j].position.z;
      const d2=sx*sx+sy*sy+sz*sz;
      if(d2<49&&d2>.01){const f=1/d2;v.x+=sx*f*.5;v.y+=sy*f*.5;v.z+=sz*f*.5}
    }

    // Match leader speed
    v.z+=(lv.z-v.z)*.03;
    v.x*=.97;v.y*=.97;

    // Speed limits
    const sp=Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z);
    if(sp>35){const s=35/sp;v.x*=s;v.y*=s;v.z*=s}
    if(sp<6){const s=6/sp;v.x*=s;v.y*=s;v.z*=s}
    if(p.y<3)v.y+=.4;if(p.y>90)v.y-=.3;

    p.addScaledVector(v,dt);
    if(sp>.5)b.lookAt(p.x+v.x,p.y+v.y,p.z+v.z);
    b.userData.ph+=dt*b.userData.fs;
    const ff=Math.sin(b.userData.ph)*.4;
    b.userData.lw.rotation.z=ff;b.userData.rw.rotation.z=-ff;
  }

  // Camera — cinematic follow with gentle bob
  const ic=new THREE.Vector3(lead.position.x-lv.x*.35,lead.position.y+12,lead.position.z+48);
  camera.position.lerp(ic,dt*3.2);
  // Subtle breathing bob and lateral sway
  camera.position.y+=Math.sin(t*.18)*0.18;
  camera.position.x+=Math.sin(t*.07)*0.06;
  camera.lookAt(new THREE.Vector3(lead.position.x+lv.x*0.3,lead.position.y+1,lead.position.z-60));

  renderer.render(scene,camera);
}

// ── START ──
document.getElementById('go').addEventListener('click',()=>{
  document.getElementById('intro').classList.add('out');
  setTimeout(()=>document.getElementById('intro').style.display='none',300);
  document.getElementById('hud').classList.add('on');
  document.getElementById('statsBar').style.display='flex';
  document.getElementById('actBar').style.display='flex';
  // Show correct music player view based on screen size
  if(window.innerWidth<=500){
    document.getElementById('music-mini').classList.add('on');
  }else{
    document.getElementById('music-bar').classList.add('on');
  }
  clock.start();started=true;
  startMusic();
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

tick();
</script>
